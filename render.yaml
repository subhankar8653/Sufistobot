services:
  - type: web
    name: filestore-bot
    env: docker
    plan: free
    autoDeploy: false
    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: OWNER_ID
        sync: false
      - key: MONGO_URI
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: MAIN_LOG_CHANNEL
        sync: false
